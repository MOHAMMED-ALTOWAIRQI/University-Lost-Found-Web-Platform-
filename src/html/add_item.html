<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Item</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 40px 0;
        }

        .container {
            width: 80%;
            max-width: 900px;
            margin: auto;
        }

        h1 {
            margin-bottom: 25px;
        }

        .card {
            background: #ffffff;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        label {
            display: block;
            font-weight: 600;
            margin: 18px 0 6px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        hr {
            margin: 30px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        .secret-title {
            font-weight: 700;
            margin-bottom: 15px;
        }

        .btn {
            margin-top: 35px;
            padding: 22px;
            background: #2ecc71;
            color: white;
            border: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #3498db;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">

    {% if item_type == 'found' %}
        <h1>Add Found Item</h1>
    {% else %}
        <h1>Report Lost Item</h1>
    {% endif %}

    <div class="card">
        <form method="POST">

            <!-- hidden type -->
            <input type="hidden" name="item_type" value="{{ item_type }}">

            <label>Item Name</label>
            <input type="text" name="item_name" required>

            <label>Category</label>
            <select name="category" required>
                <option value="">-- Select Category --</option>
                <option>Electronics</option>
                <option>Mobile Phone</option>
                <option>Laptop</option>
                <option>Wallet</option>
                <option>Keys</option>
                <option>ID / Documents</option>
                <option>Bag / Backpack</option>
                <option>Clothes</option>
                <option>Watch / Jewelry</option>
                <option>Headphones</option>
                <option>Books</option>
                <option>Cards</option>
                <option>Money</option>
                <option>Accessories</option>
                <option>Other</option>
            </select>

            <label>Description</label>
            <textarea name="description" required></textarea>

            <label>Location</label>
            <input type="text" name="location" required>

            <!-- SECRET QUESTIONS ONLY FOR OWNER -->
            {% if item_type == 'lost' %}

            <hr>

            <div class="secret-title">Secret Detail Questions</div>

            <label>1. What unique mark does the item have?</label>
            <input type="text" name="secret_mark" required>

            <label>2. What color or sticker is on the item?</label>
            <input type="text" name="secret_color" required>

            {% endif %}

            <button class="btn" type="submit">
                {% if item_type == 'found' %}
                    Save Found Item
                {% else %}
                    Report Lost Item
                {% endif %}
            </button>

        </form>

        <a href="/finder" class="back">⬅ Back</a>
    </div>
</div>

</body>
</html>
