<!DOCTYPE html>
<html>
<head>
    <title>Claims</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h2>Pending Claims</h2>

    {% for c in claims %}
    <div class="card">
        <h3>{{ c.item_name }}</h3>

        <span class="badge badge-pending">Pending</span>

        <p><b>Claim ID:</b> {{ c.claim_id }}</p>

        <form method="POST" action="/approve_claim/{{ c.claim_id }}" style="display:inline;">
            <button class="btn btn-success">Approve</button>
        </form>

        <form method="POST" action="/claim/{{ c.claim_id }}/reject" style="display:inline;">
            <button class="btn btn-danger">Reject</button>
        </form>
    </div>
    {% else %}
        <div class="card">No pending claims.</div>
    {% endfor %}
</div>

</body>
</html>
